# Per-wallbox fetch_data services are registered dynamically at runtime.
# For each configured wallbox a service named
#   fetch_data_<wallbox_name>
# is registered in this domain, where <wallbox_name> is derived from the
# wallbox alias (if set) or from the serial number (e.g. fetch_data_wallbox123456).
# These services take no parameters and immediately trigger a coordinator
# refresh for the associated wallbox entry.
